name: Frontend CI

on:
  pull_request:
    branches: [dev, test, prod]
    paths:
      - 'src/**'
      - 'app.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings=0

      - name: Expo doctor
        run: npx expo-doctor
